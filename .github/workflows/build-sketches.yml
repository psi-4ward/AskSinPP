on:
  - push
  - pull_request

jobs:
  build-sketches:
    runs-on: ubuntu-20.04
    strategy:
      matrix:
        include:
          - script: test-328p.sh
          - script: test-644p.sh

    steps:
      # GIT Checkout
      - uses: actions/checkout@v2

      - name: Setup Arduino CLI
        uses: arduino/setup-arduino-cli@v1.1.1

      - name: Install Libs and Cores
        run: tests/install-deps.sh

      - name: Download sketches
        run: tests/download-sketches.sh

      - name: Compile Sketches
        run: tests/${{ matrix.script }}
