on:
  - push
  - pull_request

jobs:
  build-sketches:
    runs-on: ubuntu-20.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - board: 328p
          - board: 644p
#          - board: bluepill

    steps:
      # GIT Checkout
      - uses: actions/checkout@v2

      - name: Setup Arduino CLI
        uses: arduino/setup-arduino-cli@v1.1.1

      - name: Install Libs and Cores
        run: tests/install-deps.sh

      - name: Download sketches
        run: tests/download-sketches.sh

      - name: Compile Sketches
        run: tests/test.sh ${{ matrix.board }}
